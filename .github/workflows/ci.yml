name: CI — Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('platform/dt-orchestrator/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/dt-orchestrator/requirements.txt
          pip install -r platform/dt-orchestrator/requirements-dev.txt
          pip install numpy pandapower

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$(echo platform/dt-contracts/python/src:platform/dt-sim-pandapower:platform/dt-orchestrator:platform/dt-ml:platform/dt-scada-protocols/src:platform/dt-compliance/src:platform/dt-cim/src:platform/dt-bescom/src:platform/dt_security:platform)" >> $GITHUB_ENV

      - name: Run backend tests
        run: |
          python -m pytest platform/dt-sim-pandapower/tests/ \
            platform/dt-ml/tests/ \
            platform/dt-compliance/tests/ \
            platform/dt-cim/tests/ \
            -v --no-header -p no:cov -o addopts= \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  test-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/dt-dashboard/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: platform/dt-dashboard

      - name: Type check
        run: npx tsc -b --noEmit
        working-directory: platform/dt-dashboard
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: platform/dt-dashboard
