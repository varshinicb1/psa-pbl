<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A01E"/>
      <stop offset="100%" stop-color="#F0C060"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003D7A"/>
      <stop offset="100%" stop-color="#002D5A"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#blue)" stroke="url(#gold)" stroke-width="4"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Open book at center -->
  <path d="M70 110 Q85 80 100 75 Q115 80 130 110 L130 130 Q115 115 100 120 Q85 115 70 130 Z" fill="url(#gold)" stroke="none"/>
  <!-- Book spine line -->
  <line x1="100" y1="75" x2="100" y2="120" stroke="#003D7A" stroke-width="1.5"/>
  <!-- Flame on top of book -->
  <path d="M90 75 Q88 60 100 50 Q112 60 110 75 Q106 68 100 70 Q94 68 90 75Z" fill="url(#gold)" stroke="none"/>
  <!-- Gear/sun around top -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7">
    <circle cx="100" cy="100" r="52"/>
    <circle cx="100" cy="100" r="50" stroke-dasharray="6,8"/>
  </g>
  <!-- "RVCE" text -->
  <text x="100" y="158" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" fill="url(#gold)" letter-spacing="3">RVCE</text>
  <!-- Year -->
  <text x="100" y="175" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#8AB4D8" letter-spacing="2">EST. 1963</text>
</svg>
