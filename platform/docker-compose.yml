version: "3.9"

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DT_LOG_LEVEL=INFO
      - DT_SIM_TICK_INTERVAL_SECONDS=1.0
      - DT_SIM_VOLTAGE_LOWER_BOUND=0.95
      - DT_SIM_VOLTAGE_UPPER_BOUND=1.05
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - dt-network

  dashboard:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../platform/dt-dashboard:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://orchestrator:8000
    depends_on:
      - orchestrator
    networks:
      - dt-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./dt-infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - dt-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - dt-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - dt-network

networks:
  dt-network:
    driver: bridge

volumes:
  grafana-data:
  redis-data:
