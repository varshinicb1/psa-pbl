name: Grid Digital Twin CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/dt-orchestrator/requirements.txt
          pip install pytest pytest-cov black ruff mypy

      - name: Lint with ruff
        run: ruff check platform/

      - name: Format check with black
        run: black --check platform/

      - name: Type check with mypy
        run: mypy platform/dt-contracts/python/src/ platform/dt-orchestrator/dt_orchestrator/

      - name: Test with pytest
        run: |
          $env:PYTHONPATH = "platform/dt-contracts/python/src;platform/dt-sim-pandapower;platform/dt-orchestrator;platform/dt-ml;platform/dt-scada-protocols/src;platform/dt-compliance/src;platform/dt-cim/src;platform/dt_security;platform"
          python -m pytest tests/ platform/dt-compliance/tests/ platform/dt-cim/tests/ platform/dt-sim-pandapower/tests/ -v -o "addopts=" --no-header -p no:cov

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: platform/dt-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/dt-dashboard

      - name: Type check
        run: npm run typecheck
        working-directory: platform/dt-dashboard

      - name: Test
        run: npm test
        working-directory: platform/dt-dashboard

      - name: Build
        run: npm run build
        working-directory: platform/dt-dashboard

  build:
    needs: [test, dashboard]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orchestrator
        uses: docker/build-push-action@v5
        with:
          context: platform/
          file: platform/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-orchestrator:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@v5
        with:
          context: platform/dt-dashboard/
          file: platform/dt-dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying orchestrator and dashboard to production cluster..."
