apiVersion: apps/v1
kind: Deployment
metadata:
  name: dt-orchestrator
  namespace: grid-digital-twin
  labels:
    app: dt-orchestrator
    version: "2.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dt-orchestrator
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dt-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics/prometheus"
    spec:
      containers:
      - name: orchestrator
        image: dt-orchestrator:2.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8001
          name: metrics
        env:
        - name: DT_LOG_LEVEL
          value: "INFO"
        - name: DT_SIM_TICK_INTERVAL_SECONDS
          value: "1.0"
        - name: DT_SIM_VOLTAGE_LOWER_BOUND
          value: "0.95"
        - name: DT_SIM_VOLTAGE_UPPER_BOUND
          value: "1.05"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dt-orchestrator-service
  namespace: grid-digital-twin
spec:
  selector:
    app: dt-orchestrator
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  - port: 8001
    targetPort: 8001
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dt-orchestrator-hpa
  namespace: grid-digital-twin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dt-orchestrator
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dt-dashboard
  namespace: grid-digital-twin
  labels:
    app: dt-dashboard
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dt-dashboard
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dt-dashboard
    spec:
      containers:
      - name: dashboard
        image: dt-dashboard:2.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        - name: VITE_API_BASE
          value: "/api"
        - name: VITE_WS_PATH
          value: "/ws"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dt-dashboard-service
  namespace: grid-digital-twin
spec:
  selector:
    app: dt-dashboard
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dt-dashboard-hpa
  namespace: grid-digital-twin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dt-dashboard
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
