global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "dt-orchestrator"
    scrape_interval: 10s
    metrics_path: "/metrics/prometheus"
    static_configs:
      - targets:
          - "orchestrator:8000"
        labels:
          service: "grid-digital-twin"
          environment: "production"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
