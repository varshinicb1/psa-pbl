[pytest]
# Pytest configuration for Grid Digital Twin

minversion = 7.0
testpaths = tests platform/*/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Add options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=platform
    --cov-report=term-missing:skip-covered
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-fail-under=70

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require setup)
    slow: Slow tests (>1 second)
    requires_pandapower: Requires pandapower backend
    requires_opendss: Requires OpenDSS backend
    requires_matpower: Requires MATPOWER backend
    asyncio: Async tests

asyncio_mode = auto
